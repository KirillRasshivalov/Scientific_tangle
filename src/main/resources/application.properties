server.port=8080
spring.application.name=nauch_klub

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5434/nauch_klub
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:knowledge-base}

yandex.api-key=${YANDEX_API_KEY:}
yandex.folder-id=${YANDEX_FOLDER_ID:}
yandex.embed-url=${YANDEX_EMBED_URL:https://llm.api.cloud.yandex.net/foundationModels/v1/textEmbedding}
yandex.embed-rps=${YANDEX_EMBED_RPS:8}
yandex.embed-dim=${YANDEX_EMBED_DIM:256}
yandex.embed-max-retries=${YANDEX_EMBED_MAX_RETRIES:5}

qdrant.url=${QDRANT_URL:http://localhost:6333}
qdrant.collection=${QDRANT_COLLECTION:knowledge_chunks}
qdrant.vector-size=${QDRANT_VECTOR_SIZE:${YANDEX_EMBED_DIM:256}}

neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
neo4j.username=${NEO4J_USERNAME:neo4j}
neo4j.password=${NEO4J_PASSWORD:knowledge12345}
neo4j.database=${NEO4J_DATABASE:neo4j}

python.answer-service-url=${PYTHON_ANSWER_SERVICE_URL:http://localhost:8000}
